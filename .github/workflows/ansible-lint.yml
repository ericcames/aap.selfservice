---
name: Ansible Lint

on:
  pull_request:
    branches: [main]

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install "ansible-lint==24.12.2" "ansible-core>=2.15,<2.19"

      - name: Run ansible-lint
        run: ansible-lint playbooks/
